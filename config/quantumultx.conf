# Quantumult X main profile
#
# Public raw base:
# https://raw.githubusercontent.com/GnaixEuy/quantumultx-config/refs/heads/main
# Keep real subscriptions, cookies, tokens, and private node data out of Git.

[general]
geo_location_checker = http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/IP_API.js
network_check_url = http://www.gstatic.com/generate_204
server_check_url = http://www.gstatic.com/generate_204
dns_exclusion_list = *.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me
udp_whitelist = 1-442, 444-65535
fallback_udp_policy = direct

[server_remote]
# Keep real node subscription URLs outside Git.
# Add subscriptions only in Quantumult X local settings.

[policy]
static = AI, Proxy, Auto, Direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/AI.png
static = Proxy, Auto, Direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png
static = Direct, direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Direct.png
static = Reject, reject, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Reject.png
url-latency-benchmark = Auto, server-tag-regex=.*, check-interval=600, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png

[filter_remote]
https://raw.githubusercontent.com/GnaixEuy/quantumultx-config/refs/heads/main/filter/ai-all-in-one.list, tag=AI all in one, force-policy=AI, update-interval=86400, enabled=true
https://raw.githubusercontent.com/GnaixEuy/quantumultx-config/refs/heads/main/filter/%E5%85%AC%E5%8F%B8%E9%9F%B3%E4%B9%90%E5%AA%92%E4%BD%93%E5%88%86%E6%B5%81.list, tag=公司音乐媒体分流, force-policy=Proxy, update-interval=86400, enabled=false
https://raw.githubusercontent.com/GnaixEuy/quantumultx-config/refs/heads/main/filter/reject.list, tag=Reject, force-policy=Reject, update-interval=86400, enabled=true
https://raw.githubusercontent.com/GnaixEuy/quantumultx-config/refs/heads/main/filter/direct.list, tag=Direct, force-policy=Direct, update-interval=86400, enabled=true
https://raw.githubusercontent.com/GnaixEuy/quantumultx-config/refs/heads/main/filter/proxy.list, tag=Proxy, force-policy=Proxy, update-interval=86400, enabled=true

[rewrite_remote]
# Example rewrite is intentionally not loaded by default.

[filter_local]
GEOIP,CN,Direct
FINAL,Proxy

[task_local]
# 0 8 * * * https://raw.githubusercontent.com/GnaixEuy/quantumultx-config/refs/heads/main/script/example.js, tag=Daily Example, enabled=false

[mitm]
# Add only the hostnames that your enabled rewrite scripts actually need.
hostname = example.com
